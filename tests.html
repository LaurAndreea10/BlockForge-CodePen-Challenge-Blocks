<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BlockForge 5 Quality Gate</title><style>:root{color-scheme:dark}body{font-family:Inter,system-ui;background:#090c18;color:#f7f8ff;margin:0;padding:24px;max-width:1000px;margin:auto}header{display:flex;justify-content:space-between;align-items:center;gap:16px}a{color:#58efff}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;margin-top:24px}.test{padding:14px;border:1px solid #ffffff20;border-radius:14px;background:#ffffff08}.ok{border-color:#6dff9a;color:#8bffad}.fail{border-color:#ff6273;color:#ff8490}.warn{border-color:#ffd166;color:#ffe09a}.summary{font-size:28px;font-weight:900;margin:24px 0}small{color:#a8aec8}button{padding:11px 15px;border-radius:12px;border:1px solid #ffffff25;background:#ffffff0d;color:#fff;font-weight:800}</style></head><body><header><div><small>BLOCKFORGE 5.0</small><h1>Quality Gate</h1></div><div><button id="run">Run tests</button> <a href="./play.html">Open game</a></div></header><div id="summary" class="summary"></div><div id="tests" class="grid"></div><script>
const tests=document.querySelector('#tests'),summary=document.querySelector('#summary');let results=[];
function add(name,status,detail=''){results.push({name,status,detail});tests.insertAdjacentHTML('beforeend',`<div class="test ${status}"><b>${status==='ok'?'✓':status==='warn'?'!':'✕'} ${name}</b><br><small>${detail}</small></div>`)}
async function text(path){const r=await fetch(path+'?test='+Date.now());if(!r.ok)throw Error(r.status);return r.text()}
async function run(){results=[];tests.innerHTML='';const check=async(name,fn)=>{try{const d=await fn();add(name,'ok',d||'Passed')}catch(e){add(name,'fail',e.message)}};
await check('Landing page',async()=>{const s=await text('./index.html');if(!s.includes('play.html'))throw Error('Play link missing');return 'Premium landing is available'});
await check('Game shell',async()=>{const s=await text('./play.html');for(const id of ['stage','modeTabs','palette','missionCard'])if(!s.includes(`id="${id}"`))throw Error(id+' missing');return 'Core game DOM found'});
await check('Engine modules',async()=>{for(const f of ['core.js','game.js','ui.js','enhancements.js','local-suite.js','refined.js'])await text('./'+f);return '6 JavaScript modules load'});
await check('Style modules',async()=>{for(const f of ['style.css','enhancements.css','local-suite.css','refined.css','landing.css'])await text('./'+f);return '5 CSS modules load'});
await check('Block catalog',async()=>{const s=await text('./core.js');const ids=['core','moss','ember','magnet','gel','void','float'];if(ids.some(x=>!s.includes(`id:'${x}'`)))throw Error('Material missing');return '7 materials found'});
await check('Demolition tools',async()=>{const s=await text('./core.js');const ids=['ball','bomb','laser','quake','meteor','hammer'];if(ids.some(x=>!s.includes(`id:'${x}'`)))throw Error('Tool missing');return '6 tools found'});
await check('Bilingual content',async()=>{const a=await text('./core.js'),b=await text('./index.html');if(!a.includes('ro:{')||!b.includes('data-ro='))throw Error('RO/EN incomplete');return 'Romanian and English found'});
await check('Engineer View',async()=>{const s=await text('./refined.js');for(const f of ['structural','stressTest','predict','paintEngineerOverlay'])if(!s.includes(`function ${f}`))throw Error(f+' missing');return 'Analysis and simulation available'});
await check('Accessibility',async()=>{const s=await text('./refined.js');if(!s.includes('speechSynthesis')||!s.includes('top-view')||!s.includes('flat-view'))throw Error('Accessible view missing');return 'Description, top and 2D views found'});
await check('Cinematic replay',async()=>{const s=await text('./refined.js');if(!s.includes('MediaRecorder')||!s.includes('playCinema'))throw Error('Cinema system missing');return 'Replay and WebM recording found'});
await check('Mobile UX',async()=>{const s=await text('./refined.css');if(!s.includes('@media(max-width:760px)')||!s.includes('mobile-open'))throw Error('Mobile rules missing');return 'Drawer, safe area and mobile layout found'});
await check('Offline cache',async()=>{const s=await text('./sw.js');for(const f of ['play.html','refined.js','landing.css'])if(!s.includes(f))throw Error(f+' not cached');return 'BlockForge 5 assets cached'});
await check('Manifest',async()=>{const m=JSON.parse(await text('./manifest.webmanifest'));if(!m.name||!m.icons?.length)throw Error('Invalid manifest');return m.name});
await check('Local persistence',async()=>{localStorage.setItem('bf.test','ok');if(localStorage.getItem('bf.test')!=='ok')throw Error('Unavailable');localStorage.removeItem('bf.test');return 'Read/write passed'});
await check('Corrupt-save resilience',async()=>{try{JSON.parse('{broken')}catch{return 'Invalid JSON is detectable'}throw Error('Unexpected')});
const pass=results.filter(x=>x.status==='ok').length;summary.textContent=`${pass}/${results.length} tests passed`;summary.style.color=pass===results.length?'#7cff9b':'#ffd166'}
document.querySelector('#run').onclick=run;run();
</script></body></html>
