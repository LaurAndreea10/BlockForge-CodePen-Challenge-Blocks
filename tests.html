<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BlockForge 6.3 Quality Gate</title><style>:root{color-scheme:dark}body{font-family:Inter,system-ui;background:#090c18;color:#f7f8ff;margin:0;padding:24px;max-width:1100px;margin:auto}header{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}a{color:#7dff9a}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;margin-top:24px}.test{padding:14px;border:1px solid #ffffff20;border-radius:14px;background:#ffffff08}.ok{border-color:#6dff9a;color:#8bffad}.fail{border-color:#ff6273;color:#ff8490}.summary{font-size:28px;font-weight:900;margin:24px 0}small{color:#a8aec8}button{padding:11px 15px;border-radius:12px;border:1px solid #ffffff25;background:#ffffff0d;color:#fff;font-weight:800}</style></head><body><header><div><small>BLOCKFORGE 6.3</small><h1>Quality Gate</h1></div><div><button id="run">Run tests</button> <a href="./play.html">Open game</a> · <a href="./architecture.html">Architecture</a></div></header><div id="summary" class="summary"></div><div id="tests" class="grid"></div><script>const tests=document.querySelector('#tests'),summary=document.querySelector('#summary');let results=[];function add(name,status,detail=''){results.push({name,status,detail});tests.insertAdjacentHTML('beforeend',`<div class="test ${status}"><b>${status==='ok'?'✓':'✕'} ${name}</b><br><small>${detail}</small></div>`)}async function text(path){const r=await fetch(path+'?test='+Date.now());if(!r.ok)throw Error(r.status);return r.text()}async function run(){results=[];tests.innerHTML='';const check=async(name,fn)=>{try{add(name,'ok',await fn()||'Passed')}catch(e){add(name,'fail',e.message)}};await check('Landing 6.3',async()=>{const s=await text('./index.html');if(!s.includes('City Management Edition')||!s.includes('play.html'))throw Error('Landing not updated');return 'City Management landing and play link found'});await check('Game shell',async()=>{const s=await text('./play.html');for(const id of ['stage','modeTabs','palette','missionCard'])if(!s.includes(`id="${id}"`))throw Error(id+' missing');if(!s.includes('city-management.js'))throw Error('City module missing');return 'Core game and 6.3 loader found'});await check('JavaScript modules',async()=>{for(const f of ['core.js','game.js','ui.js','enhancements.js','local-suite.js','refined.js','version-history.js','portfolio-edition.js','portfolio-modes.js','stability.js','simulation.js','disaster.js','transportation.js','city-management.js'])await text('./'+f);return '14 JavaScript modules load'});await check('CSS modules',async()=>{for(const f of ['style.css','enhancements.css','local-suite.css','refined.css','version-history.css','portfolio-edition.css','stability.css','simulation.css','disaster.css','transportation.css','city-management.css'])await text('./'+f);return '11 game style modules load'});await check('City systems',async()=>{const s=await text('./city-management.js');for(const n of ['advanceMonth','refreshDerived','cityDisaster','evacuationScore','exportReport','generateCity'])if(!s.includes(`function ${n}`))throw Error(n+' missing');return 'Districts, economy, utilities, resilience and reports found'});await check('Urban services',async()=>{const s=await text('./city-management.js');for(const n of ['hospital','school','fire','police','shelter','accessibleHub'])if(!s.includes(n))throw Error(n+' missing');return 'Health, education, safety, shelter and accessibility found'});await check('Transport and rescue coexist',async()=>{const a=await text('./transportation.js'),b=await text('./disaster.js'),c=await text('./city-management.js');if(!a.includes('bf.transport.v6.2')||!b.includes('bf.rescue.v6.1')||!c.includes('bf.city.v6.3'))throw Error('Version layers incomplete');return '6.1, 6.2 and 6.3 local layers coexist'});await check('Bilingual content',async()=>{const a=await text('./core.js'),b=await text('./index.html');if(!a.includes('ro:{')||!b.includes('data-ro='))throw Error('RO/EN incomplete');return 'Romanian and English found'});await check('Offline cache',async()=>{const s=await text('./sw.js');for(const f of ['city-management.js','city-management.css','transportation.js','disaster.js','simulation.js'])if(!s.includes(f))throw Error(f+' not cached');if(!s.includes('blockforge-v6.3.0'))throw Error('Cache version incorrect');return '6.3 assets listed for offline use'});await check('Manifest 6.3',async()=>{const m=JSON.parse(await text('./manifest.webmanifest'));if(!m.name.includes('6.3')||!m.icons?.length)throw Error('Manifest not updated');return m.name});await check('SEO files',async()=>{await text('./robots.txt');await text('./sitemap.xml');return 'Robots and sitemap load'});await check('Local persistence',async()=>{localStorage.setItem('bf.city.test','ok');if(localStorage.getItem('bf.city.test')!=='ok')throw Error('Unavailable');localStorage.removeItem('bf.city.test');return 'Read/write passed'});const pass=results.filter(x=>x.status==='ok').length;summary.textContent=`${pass}/${results.length} tests passed`;summary.style.color=pass===results.length?'#7cff9b':'#ffd166'}document.querySelector('#run').onclick=run;run();</script></body></html>
