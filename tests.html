<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>BlockForge Tests</title><style>body{font-family:system-ui;background:#0b1020;color:#fff;padding:24px}.ok{color:#7cff9b}.fail{color:#ff6b6b}pre{white-space:pre-wrap}</style></head><body><h1>BlockForge smoke tests</h1><pre id="out"></pre><script src="core.js"></script><script>const out=document.querySelector('#out');function test(name,fn){try{fn();out.innerHTML+=`<span class="ok">✓ ${name}</span>\n`}catch(e){out.innerHTML+=`<span class="fail">✗ ${name}: ${e.message}</span>\n`}}test('Seven block types',()=>{if(BLOCKS.length!==7)throw Error(BLOCKS.length)});test('Six demolition tools',()=>{if(TOOLS.length!==6)throw Error(TOOLS.length)});test('Romanian translations',()=>{if(!I18N.ro.challenge)throw Error('missing')});test('Grid constants',()=>{if(SIZE!==8||MAX_Z<8)throw Error('invalid')});test('All block IDs unique',()=>{if(new Set(BLOCKS.map(x=>x.id)).size!==BLOCKS.length)throw Error('duplicate')});test('All tools IDs unique',()=>{if(new Set(TOOLS.map(x=>x.id)).size!==TOOLS.length)throw Error('duplicate')});</script></body></html>
